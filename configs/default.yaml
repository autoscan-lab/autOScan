# felituive default configuration

# LLM settings
llm:
  provider: ollama
  model: llama3.2
  host: http://localhost:11434

# Embedding settings
embedding:
  provider: ollama
  model: nomic-embed-text

# Storage settings
storage:
  backend: sqlite
  path: ~/.felituive/data.db

# Retrieval settings
retrieval:
  backend: cosine  # or "atlas" for MongoDB Atlas
  top_k: 5

# Chunking settings
chunking:
  max_tokens: 512
  overlap: 50
