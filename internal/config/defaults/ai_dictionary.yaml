          }
          return 0;
      }

  - id: "bounded_shared_ring_buffer"
    category: "ipc"
    title: "Shared-memory ring buffer skeleton"
    code: |
      #define RING_CAP 64

      typedef struct {
          int head;
          int tail;
          int data[RING_CAP];
      } ring_t;

      int ring_push(ring_t *r, int v) {
          int next = (r->tail + 1) % RING_CAP;
          if (next == r->head) {
              return 0;
          }
          r->data[r->tail] = v;
          r->tail = next;
          return 1;
      }

      int ring_pop(ring_t *r, int *out) {
          if (r->head == r->tail) {
              return 0;
          }
          *out = r->data[r->head];
          r->head = (r->head + 1) % RING_CAP;
          return 1;
      }

  - id: "fcntl_lock_retry"
    category: "files"
    title: "fcntl write lock with retry loop"
    code: |
      int lock_file_retry(int fd) {
          struct flock lk;
          lk.l_type = F_WRLCK;
          lk.l_whence = SEEK_SET;
          lk.l_start = 0;
          lk.l_len = 0;

          while (fcntl(fd, F_SETLK, &lk) < 0) {
              if (errno != EACCES && errno != EAGAIN) {
                  return -1;
              }
              usleep(3000);
          }
          return 0;
      }

  - id: "select_timeout_wrapper"
    category: "sockets"
    title: "select-based timeout wrapper"
    code: |
      int wait_readable(int fd, int timeout_ms) {
          fd_set rfds;
          struct timeval tv;
          int rc;

          FD_ZERO(&rfds);
          FD_SET(fd, &rfds);

          tv.tv_sec = timeout_ms / 1000;
          tv.tv_usec = (timeout_ms % 1000) * 1000;

          rc = select(fd + 1, &rfds, 0, 0, &tv);
          if (rc <= 0) {
              return rc;
          }
          return FD_ISSET(fd, &rfds) ? 1 : 0;
      }

  - id: "cleanup_goto_pattern"
    category: "resource-management"
    title: "Single-exit cleanup with goto"
    code: |
      int do_work(const char *path) {
          int fd = -1;
          char *buf = 0;
          int rc = -1;

          fd = open(path, O_RDONLY);
          if (fd < 0) {
              goto cleanup;
          }

          buf = malloc(4096);
          if (buf == 0) {
              goto cleanup;
          }

          if (read(fd, buf, 4096) < 0) {
              goto cleanup;
          }

          rc = 0;

      cleanup:
          if (fd >= 0) {
              close(fd);
          }
          if (buf) {
              free(buf);
          }
          return rc;
      }
