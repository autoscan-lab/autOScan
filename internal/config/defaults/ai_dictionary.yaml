  - id: "polling_loop_for_message_queue"
    category: "ipc"
    title: "Polling mq_receive with retry sleep"
    code: |
      int recv_with_poll(int mq, char *buf, int len) {
          int n;
          while (1) {
              n = mq_receive(mq, buf, len, 0);
              if (n >= 0) {
                  return n;
              }
              if (errno != EAGAIN) {
                  return -1;
              }
              usleep(2000);
          }
      }

  - id: "pipe_fork_bridge_template"
    category: "process"
    title: "Fork + pipe patterns (one-way and request/response)"
    code: |
      int run_child_oneway(void) {
          int p2c[2];
          pid_t pid;
          char ch;

          if (pipe(p2c) < 0) {
              return -1;
          }

          pid = fork();
          if (pid < 0) {
              return -1;
          }

          if (pid == 0) {
              close(p2c[0]);
              ch = 'X';
              write(p2c[1], &ch, 1);
              close(p2c[1]);
              _exit(0);
          }

          close(p2c[1]);
          read(p2c[0], &ch, 1);
          close(p2c[0]);
          waitpid(pid, 0, 0);
          return 0;
      }

      int run_child_roundtrip(void) {
          int p2c[2];
          int c2p[2];
          pid_t pid;
          char in = 'A';
          char out = 0;

          if (pipe(p2c) < 0 || pipe(c2p) < 0) {
              return -1;
          }

          pid = fork();
          if (pid < 0) {
              return -1;
          }

          if (pid == 0) {
              close(p2c[1]);
              close(c2p[0]);
              read(p2c[0], &out, 1);
              if (out >= 'a' && out <= 'z') {
                  out = (char)(out - ('a' - 'A'));
              }
              write(c2p[1], &out, 1);
              close(p2c[0]);
              close(c2p[1]);
              _exit(0);
          }

          close(p2c[0]);
          close(c2p[1]);
          write(p2c[1], &in, 1);
          read(c2p[0], &out, 1);
          close(p2c[1]);
          close(c2p[0]);
          waitpid(pid, 0, 0);
          return 0;
      }

  - id: "manual_nonblocking_read_retry"
    category: "io"
    title: "Retry loop for EAGAIN/EWOULDBLOCK"
    code: |
      int read_retry(int fd, char *buf, int cap) {
          int n;
          while (1) {
              n = read(fd, buf, cap);
              if (n >= 0) {
                  return n;
              }
              if (errno == EAGAIN || errno == EWOULDBLOCK) {
                  usleep(1000);
                  continue;
              }
              return -1;
          }
      }

  - id: "signal_stop_flag_template"
    category: "signals"
    title: "Signal handler with global stop flag"
    code: |
      volatile sig_atomic_t keep_running = 1;

      void on_signal(int signo) {
          (void)signo;
          keep_running = 0;
      }

      int event_loop(void) {
          while (keep_running) {
