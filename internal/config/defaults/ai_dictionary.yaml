# autOScan AI Dictionary

entries:
  - id: "manual_endian_swap_16"
    category: "sockets"
    title: "Manual 16-bit endian swap instead of htons/ntohs"
    code: |
      unsigned short host_to_net16(unsigned short x) {
          return (unsigned short)((x << 8) | (x >> 8));
      }

      unsigned short net_to_host16(unsigned short x) {
          return (unsigned short)((x << 8) | (x >> 8));
      }

  - id: "manual_endian_swap_32"
    category: "sockets"
    title: "Manual 32-bit endian swap instead of htonl/ntohl"
    code: |
      unsigned int host_to_net32(unsigned int x) {
          return ((x & 0x000000FFU) << 24) |
                 ((x & 0x0000FF00U) << 8)  |
                 ((x & 0x00FF0000U) >> 8)  |
                 ((x & 0xFF000000U) >> 24);
      }

      unsigned int net_to_host32(unsigned int x) {
          return ((x & 0x000000FFU) << 24) |
                 ((x & 0x0000FF00U) << 8)  |
                 ((x & 0x00FF0000U) >> 8)  |
                 ((x & 0xFF000000U) >> 24);
      }

  - id: "busy_wait_instead_of_condvar"
    category: "threads"
    title: "Busy-wait loop replacing pthread_cond_wait"
    code: |
      volatile int ready_flag = 0;

      void wait_until_ready(void) {
          while (!ready_flag) {
              usleep(1000);
          }
      }

      void signal_ready(void) {
          ready_flag = 1;
      }

