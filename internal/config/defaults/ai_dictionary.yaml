# autOScan AI Dictionary

entries:
  - id: "manual_endian_swap_16"
    category: "sockets"
    title: "Manual 16-bit endian swap instead of htons/ntohs"
    code: |
      unsigned short host_to_net16(unsigned short x) {
          return (unsigned short)((x << 8) | (x >> 8));
      }

      unsigned short net_to_host16(unsigned short x) {
          return (unsigned short)((x << 8) | (x >> 8));
      }

  - id: "manual_endian_swap_32"
    category: "sockets"
    title: "Manual 32-bit endian swap instead of htonl/ntohl"
    code: |
      unsigned int host_to_net32(unsigned int x) {
          return ((x & 0x000000FFU) << 24) |
                 ((x & 0x0000FF00U) << 8)  |
                 ((x & 0x00FF0000U) >> 8)  |
                 ((x & 0xFF000000U) >> 24);
      }

      unsigned int net_to_host32(unsigned int x) {
          return ((x & 0x000000FFU) << 24) |
                 ((x & 0x0000FF00U) << 8)  |
                 ((x & 0x00FF0000U) >> 8)  |
                 ((x & 0xFF000000U) >> 24);
      }

  - id: "manual_nonblocking_read_retry"
    category: "io"
    title: "Retry loop for EAGAIN/EWOULDBLOCK"
    code: |
      int read_retry(int fd, char *buf, int cap) {
          int n;
          while (1) {
              n = read(fd, buf, cap);
              if (n >= 0) {
                  return n;
              }
              if (errno == EAGAIN || errno == EWOULDBLOCK) {
                  usleep(1000);
                  continue;
              }
              return -1;
          }
      }

  - id: "signal_stop_flag_template"
    category: "signals"
    title: "Signal handler with global stop flag"
    code: |
      volatile sig_atomic_t keep_running = 1;

      void on_signal(int signo) {
          (void)signo;
          keep_running = 0;
      }

      int event_loop_with_limit(int sleep_us, int max_iters) {
          int iters = 0;
          while (keep_running) {
              usleep(sleep_us);
              iters++;
              if (max_iters > 0 && iters >= max_iters) {
                  break;
              }
          }
          return iters;
      }

      void install_default_handlers(void) {
          signal(SIGINT, on_signal);
          signal(SIGTERM, on_signal);
      }

  - id: "fcntl_lock_retry"
    category: "files"
    title: "fcntl write lock with retry loop"
    code: |
      int lock_file_retry(int fd) {
          struct flock lk;
          lk.l_type = F_WRLCK;
          lk.l_whence = SEEK_SET;
          lk.l_start = 0;
          lk.l_len = 0;

          while (fcntl(fd, F_SETLK, &lk) < 0) {
              if (errno != EACCES && errno != EAGAIN) {
                  return -1;
              }
              usleep(3000);
          }
          return 0;
      }

  - id: "cleanup_goto_pattern"
    category: "resource-management"
    title: "Single-exit cleanup with goto"
    code: |
      int do_work(const char *path) {
          int fd = -1;
          char *buf = 0;
          int rc = -1;

          fd = open(path, O_RDONLY);
          if (fd < 0) {
              goto cleanup;
          }

          buf = malloc(4096);
          if (buf == 0) {
              goto cleanup;
          }

          if (read(fd, buf, 4096) < 0) {
              goto cleanup;
          }

          rc = 0;

      cleanup:
          if (fd >= 0) {
              close(fd);
          }
          if (buf) {
              free(buf);
          }
          return rc;
      }

  - id: "posix_named_semaphore_flow"
    category: "ipc"
    title: "POSIX named semaphore open/wait/post/close/unlink"
    code: |
      int run_named_semaphore_worker(const char *name, int loops) {
          sem_t *sem;
          int i;

          sem = sem_open(name, O_CREAT, 0600, 1);
          if (sem == SEM_FAILED) {
              return -1;
          }

          for (i = 0; i < loops; i++) {
              if (sem_wait(sem) < 0) {
                  sem_close(sem);
                  return -1;
              }
              usleep(500);
              if (sem_post(sem) < 0) {
                  sem_close(sem);
                  return -1;
              }
          }

          if (sem_close(sem) < 0) {
              return -1;
          }
          return sem_unlink(name);
      }

  - id: "posix_shared_memory_mmap_flow"
    category: "ipc"
    title: "POSIX shared memory with shm_open + ftruncate + mmap"
    code: |
      typedef struct {
          int counter;
          char data[128];
      } shm_block_t;

      int write_shared_block(const char *name, const char *msg) {
          int fd;
          shm_block_t *blk;

          fd = shm_open(name, O_CREAT | O_RDWR, 0600);
          if (fd < 0) {
              return -1;
          }
          if (ftruncate(fd, sizeof(shm_block_t)) < 0) {
              close(fd);
              return -1;
          }

          blk = (shm_block_t *)mmap(0, sizeof(shm_block_t), PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
          if (blk == MAP_FAILED) {
              close(fd);
              return -1;
          }

          blk->counter = blk->counter + 1;
          strncpy(blk->data, msg, sizeof(blk->data) - 1);
          blk->data[sizeof(blk->data) - 1] = '\0';

          munmap(blk, sizeof(shm_block_t));
          close(fd);
          return 0;
      }

      int cleanup_shared_block(const char *name) {
          return shm_unlink(name);
      }
