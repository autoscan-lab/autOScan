name: S5-msgqs
root: .
discover:
    leaf_submission: true
    min_c_files: 1
compile:
    gcc: gcc
    flags:
        - -Wall
        - -Wextra
run:
    multi_process:
        enabled: true
        executables:
            - name: S5_estudy
              source_file: S5_estudy.c
            - name: S5_user
              source_file: S5_user.c
              start_delay_ms: 50
        test_scenarios:
            - name: No args
